name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Skip frontend build (demo mode)
        run: echo "Frontend build skipped for demo"

  # ── Backend ───────────────────────────────────────────────────────────────────
  backend:
    name: Backend — Lint & Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Syntax check
        run: uv run python -m py_compile backend/app.py backend/run.py

      - name: Lint with ruff
        run: uv run --with ruff ruff check backend/
