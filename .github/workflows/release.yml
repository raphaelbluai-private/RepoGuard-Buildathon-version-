name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── 1. CI gate ────────────────────────────────────────────────────────────────
  frontend-ci:
    name: Frontend — Type Check & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: artifacts/repoguard/dist/
          retention-days: 1

  backend-ci:
    name: Backend — Lint & Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Syntax check
        run: uv run python -m py_compile backend/app.py backend/run.py

      - name: Lint with ruff
        run: uv run --with ruff ruff check backend/

  # ── 2. Package & publish release ─────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "value=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Extract changelog for this release
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          # Pull the block that starts with "## <version>" up to the next "## "
          NOTES=$(awk "/^## ${VERSION}/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See CHANGELOG.md for details."
          fi
          # Write to a temp file so multiline content survives env export
          echo "$NOTES" > /tmp/release_notes.md
          echo "notes_file=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/frontend/

      - name: Package frontend dist
        run: |
          cd dist/frontend
          zip -r "../../repoguard-frontend-${{ steps.version.outputs.value }}.zip" .

      - name: Package backend
        run: |
          zip -r "repoguard-backend-${{ steps.version.outputs.value }}.zip" \
            backend/ pyproject.toml uv.lock \
            --exclude "backend/__pycache__/*" \
            --exclude "backend/*.pyc"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "REPOGUARD ${{ github.ref_name }}"
          body_path: ${{ steps.changelog.outputs.notes_file }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            repoguard-frontend-${{ steps.version.outputs.value }}.zip
            repoguard-backend-${{ steps.version.outputs.value }}.zip
