kind = "web"
previewPath = "/"
title = "REPOGUARD"
version = "1.0.0"
id = "artifacts/repoguard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18733

[services.development]
run = "pnpm --filter @workspace/repoguard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/repoguard", "run", "build" ]
publicDir = "artifacts/repoguard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18733"
BASE_PATH = "/"
